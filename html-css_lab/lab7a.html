<!DOCTYPE HTML>

<html>
	<head>
		<title>JSON/CSV Converter</title>
	<style>
	body {
	font-family: Arial, sans-serif;
	line-height: 1.6;
	margin: 0;	
	padding: 20px;
	background-color: #f4f4f4;
	}
	.container {
	max-width: 800px;
	margin: auto;
	background: white;
	padding: 20px;
	border-radius: 5px;
	box-shadow: 0 0 10px; 
	}
	h1 {
	color: #333;
	}
	textarea {
	width: 100%;
	height: 100px;
	margin-bottom: 10px;
	}
	button {
	background-color: #4CAF50;
	color: white;
	padding: 10px 15px;
	border: none;
	border-radius: 4px;
	cursor: pointer;
	margin-right: 10px;
	}
	#result {
	margin-top: 20px;
	padding: 10px;
	background-color: #e7e7e7;
	border-radius: 4px;
	}
</style>


	</head>

	<body>
		<div class="container">

<h1>JSON/CSV Converter and Hash Generator</h1>

<h2>a) Convert JSON to JavaScript Object</h2>
<textarea id="jsonInput" placeholder="Enter JSON here"></textarea>
<button onclick="convertJsonToObject()">Convert to Object</button>



<h2>b) Convert JSON to Date</h2>
<textarea id="jsonDateInput" placeholder='Enter JSON date string
'></textarea>
<button onclick="convertJsonToDate()">Convert to Date</button>



<h2>d) Create Hash from String</h2>
<textarea id="hashInput" placeholder="Enter string to hash"></textarea>
<button onclick="createHash()">Generate Hash</button>
	<div id="result"></div>
	</div>
	
<!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script> -->
	<script>
function convertJsonToObject() {
    try {
          const jsonInput = document.getElementById('jsonInput').value.trim();
        if (!jsonInput) {
  document.getElementById('result').innerText = 'Error: Input JSON is empty.';
            return;
        }
        const jsObject = JSON.parse(jsonInput);
 document.getElementById('result').innerText = 'Converted Object:\n' + JSON.stringify(jsObject, null, 2);
    } 
   catch (error) {
                document.getElementById('result').innerText = 'Error: ' + error.message;
    }
}


function convertJsonToDate() {
//{"date": "2023-11-18T12:00:00Z"}
try {
const jsonInput = document.getElementById('jsonDateInput').value;
const jsObject = JSON.parse(jsonInput);
const date = new Date(jsObject.date);
document.getElementById('result').innerText = 'Converted Date: ' + date.toString();
} catch (error) {
document.getElementById('result').innerText = 'Error: ' + error.message;
}
}



function createHash() {
    try {
 const input = document.getElementById('hashInput').value;
        if (!input.trim()) {
            document.getElementById('result').innerText = 'Error: Input text is empty.';
            return;
        }
const hash = CryptoJS.SHA256(input).toString(CryptoJS.enc.Hex);

 document.getElementById('result').innerText = 'Generated Hash (SHA-256): ' + hash;
    } catch (error) {
        document.getElementById('result').innerText = 'Error: ' + error.message;
    }
}	</script>
	</body>
</html>
